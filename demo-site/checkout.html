<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demo Store | Checkout</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="../sdk/dist/analytics.js"></script>
    <script>
      Analytics.init({ apiUrl: 'http://localhost:5000/api/events' });
    </script>
</head>
<body class="bg-gray-50 text-gray-900 font-sans min-h-screen flex flex-col">
    <nav class="bg-white shadow-sm border-b border-gray-100">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <div class="flex-shrink-0 font-bold text-xl text-blue-600">DemoStore</div>
                <div class="hidden md:flex space-x-8">
                    <a href="index.html" class="text-gray-500 hover:text-gray-900">Home</a>
                    <a href="products.html" class="text-gray-500 hover:text-gray-900">Products</a>
                    <a href="cart.html" class="text-gray-500 hover:text-gray-900">Cart (2)</a>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-3xl mx-auto px-4 w-full py-10 flex-1">
        <h1 class="text-2xl font-bold mb-6">Checkout</h1>
        <div class="bg-white rounded-lg shadow-sm border border-gray-100 p-6 mb-6">
            <h2 class="text-lg font-medium mb-4">Payment Details</h2>
            <div class="space-y-4">
                <input type="text" placeholder="Card Number" class="w-full border border-gray-300 rounded p-3">
                <div class="flex space-x-4">
                    <input type="text" placeholder="MM/YY" class="w-1/2 border border-gray-300 rounded p-3">
                    <input type="text" placeholder="CVC" class="w-1/2 border border-gray-300 rounded p-3">
                </div>
            </div>
        </div>
        <button class="w-full bg-green-600 text-white py-3 rounded-lg font-medium hover:bg-green-700 text-lg" onclick="alert('Order Placed Successfully! (Demo)')">
            Complete Order ($259.98)
        </button>
    </main>
</body>
</html>
